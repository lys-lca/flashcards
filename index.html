<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Flashcards</title><link rel="stylesheet" href="style.css"/></head><body><div class="screen"><div class="category-area"><label>Choose Category:</label><select id="category-select" onchange="changeCategory()"><option value="ict10">ICT Sample (10 cards)</option></select></div><div class="card"><div id="category" class="category-label"></div><img id="card-image" class="flashcard-image" src="" alt=""/><h2 id="question" class="question"></h2><div id="hint" class="hint"></div><div id="answer" class="answer"></div><div class="score-box">Correct: <span id="correct">0</span> | Incorrect: <span id="incorrect">0</span></div><div class="btn-row"><button class="btn blue" onclick="showHint()">Show Hint</button><button class="btn blue" onclick="revealAnswer()">Reveal Answer</button><button class="btn green" onclick="markCorrect()">Correct</button><button class="btn red" onclick="markIncorrect()">Incorrect</button><button class="btn blue" onclick="prevCard()">Previous</button><button class="btn blue" onclick="nextCard()">Next</button><button class="btn gray" onclick="resetScores()">Reset Scores</button></div></div></div><script src="app.js"></script><script src="run.js"></script></body></html>
